[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    integration: hits real Snowflake + Bedrock (set RUN_INTEGRATION=1)
    slow: takes > 5 seconds
filterwarnings =
    ignore::DeprecationWarning:pydantic.*
    ignore::PendingDeprecationWarning
